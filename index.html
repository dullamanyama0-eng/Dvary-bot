<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; overflow: hidden; }

        /* Video ya Background (Iliyo na ukungu/blur kama ile video) */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            filter: blur(12px) brightness(0.6); /* Ukungu na giza kidogo ili box lionekane */
        }

        /* Overlay ya Malipo */
        .paywall-overlay {
            height: 100%; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.4);
        }

        .pay-card {
            background: #ffffff; width: 90%; max-width: 380px;
            border-radius: 20px; padding: 30px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .pay-card h2 { font-size: 20px; color: #1a1a1a; margin-bottom: 10px; }
        .pay-card p { font-size: 14px; color: #555; margin-bottom: 25px; line-height: 1.5; }

        /* Kitufe cha Malipo kinachoonekana kama ile video */
        .btn-pay {
            background: #1c7c32; /* Rangi ya kijani kama HarakaPay/M-Pesa */
            color: white; border: none; width: 100%; padding: 15px;
            border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-pay:active { transform: scale(0.98); background: #155d25; }

        .payment-icons {
            margin-top: 20px; display: flex; justify-content: center; gap: 15px;
            opacity: 0.7;
        }
        .payment-icons span { font-size: 11px; color: #888; font-weight: bold; border: 1px solid #ddd; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>

    <div class="paywall-overlay">
        <div class="pay-card">
            <h2>Lipia TSH 1,000 Kuendelea</h2>
            <p>Ili kupata Full Connection, Groups, na Video zote, kamilisha malipo hapa chini.</p>

            <button class="btn-pay" onclick="window.location.href='https://harakapay.net/pay/HPMO4UY244'">
                LIPIA SASA
            </button>

            <div class="payment-icons">
                <span>M-PESA</span>
                <span>TIGO PESA</span>
                <span>AIRTEL</span>
                <span>HALOPESA</span>
            </div>
        </div>
    </div>

</body>
</html>
