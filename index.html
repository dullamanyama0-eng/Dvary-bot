<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY MULTI-VIDEO LOCKER</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .container { width: 100%; max-width: 500px; margin: auto; position: relative; }
        video { width: 100%; background: #111; border-bottom: 3px solid #25D366; }
        #locker { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { background: #25D366; color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
        
        /* Admin Section */
        #admin-panel { display: none; background: #222; padding: 20px; margin-top: 20px; border-radius: 10px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h3 onclick="checkAdmin()" style="cursor:pointer">📺 DVARY PREMIUM</h3>
    
    <video id="dvaryVideo" controls playsinline>
        <source id="videoSource" src="video.mp4" type="video/mp4">
    </video>

    <div id="locker">
        <h2 style="color:#25D366">🔒 VIDEO IMEFUNGWA</h2>
        <p>Lipia TZS 500 uendelee.</p>
        <a href="https://wa.me/225694670587" class="btn">LIPIA WHATSAPP</a>
    </div>

    <div id="admin-panel">
        <h3>🛠️ ADMIN SETTINGS</h3>
        <input type="text" id="newVideoUrl" placeholder="Paste Video Link (Direct MP4)">
        <button class="btn" onclick="updateVideo()">BADILISHA VIDEO</button>
    </div>
</div>

<script>
    const video = document.getElementById("dvaryVideo");
    const source = document.getElementById("videoSource");
    const locker = document.getElementById("locker");

    // Pakia video ya mwisho iliyowekwa na Admin
    const savedVideo = localStorage.getItem('dvary_current_video');
    if (savedVideo) {
        source.src = savedVideo;
        video.load();
    }

    // Mtego wa sekunde 15
    video.ontimeupdate = function() {
        if (video.currentTime >= 15) {
            video.pause();
            video.currentTime = 15;
            locker.style.display = "flex";
        }
    };

    // Kazi ya Password
    function checkAdmin() {
        let pass = prompt("Ingiza Password ya Admin:");
        if (pass === "dvar122") {
            alert("Karibu Master!");
            document.getElementById('admin-panel').style.display = "block";
        } else {
            alert("Wewe siyo Admin!");
        }
    }

    // Badilisha Video
    function updateVideo() {
        const newUrl = document.getElementById('newVideoUrl').value;
        if (newUrl) {
            localStorage.setItem('dvary_current_video', newUrl);
            source.src = newUrl;
            video.load();
            alert("Video imebadilishwa! Refresh ukurasa.");
            document.getElementById('admin-panel').style.display = "none";
        }
    }
</script>

</body>
</html>
