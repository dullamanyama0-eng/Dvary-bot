<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY PREMIUM PREVIEW</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .video-container { position: relative; width: 100%; max-width: 600px; margin: auto; background: #111; }
        video { width: 100%; border-bottom: 3px solid #25D366; }
        
        #locker {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        .wa-btn {
            background: #25D366; color: #fff; padding: 15px 30px;
            border: none; border-radius: 30px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: 20px;
            text-decoration: none; display: inline-block;
        }
        .alert { color: #ffcc00; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="video-container">
    <h2 style="font-size: 16px; padding: 10px; color: #ccc;">📺 PREVIEW MODE (SEKUNDE 15)</h2>
    
    <video id="dvaryVideo" controls controlsList="nodownload">
        <source src="https://files.catbox.moe/ej5y26.mp4" type="video/mp4">
    </video>

    <div id="locker">
        <h2 style="color:#25D366">🔒 MWISHO WA PREVIEW</h2>
        <p style="padding: 0 20px;">Ili kutazama video hii yote (Full Video), unapaswa kulipia TZS 500.</p>
        
        <a href="https://wa.me/225694670587?text=Habari%20Master%20Dvary,%20nimelipia%20nataka%20full%20video%20ya%20premium." class="wa-btn">
            ✅ PATA FULL VIDEO (WHATSAPP)
        </a>
        <p class="alert">Ukimaliza kulipia utapewa link ya kuiona yote.</p>
    </div>
</div>

<script>
    const video = document.getElementById("dvaryVideo");
    const locker = document.getElementById("locker");
    
    // 1. CHAGUA SEKUNDE YA KUSIMAMISHA
    const stopTime = 15; 

    video.ontimeupdate = function() {
        // Izuie video isicheze baada ya stopTime
        if (video.currentTime >= stopTime) {
            video.pause();
            video.currentTime = stopTime;
            locker.style.display = "flex";
        }
    };

    // 2. ZUIA MTU ASIPELKE MBELE (Fast Forward)
    video.onseeking = function() {
        if (video.currentTime > stopTime) {
            video.currentTime = stopTime;
            video.pause();
            locker.style.display = "flex";
        }
    };
</script>

</body>
</html>
