<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary QR Pro - Single Use</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #0088cc; --dark: #1a1a1a; --success: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .card { background: #262626; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-pay { background: var(--primary); color: white; }
        .btn-wa { background: var(--success); color: white; text-decoration: none; display: block; }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .opt-btn { background: #333; color: #ccc; padding: 10px; border-radius: 8px; font-size: 11px; border: 1px solid #444; }
        .active-opt { border-color: var(--primary); color: white; background: #004466; }
        #qrDisplay { margin-top: 20px; padding: 20px; background: white; border-radius: 15px; display: none; flex-direction: column; align-items: center; }
        #qrCanvas canvas { width: 100% !important; height: auto !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="lock" class="card">
        <h1 style="color: var(--primary);">DVARY QR PRO</h1>
        <p>Ingiza Voucher (Inatumika mara moja tu).</p>
        <input type="text" id="pass" placeholder="Ingiza Voucher hapa...">
        <button class="btn btn-pay" onclick="verify()">FUNGUA SASA</button>
        <a href="https://wa.me/225752670587?text=Habari+Dvary,+nahitaji+Voucher+ya+QR+App" class="btn btn-wa">NUNUA VOUCHER (1,000/-)</a>
    </div>

    <div id="app" class="card hidden">
        <h2 style="color: var(--primary);">TENGENEZA QR CODE</h2>
        <div class="option-grid">
            <button class="opt-btn" id="opt-link" onclick="setMode('link')">LINK</button>
            <button class="opt-btn" id="opt-picha" onclick="setMode('picha')">UPLOAD</button>
            <button class="opt-btn" id="opt-tel" onclick="setMode('tel')">NAMBA</button>
        </div>
        
        <input type="text" id="content" class="hidden" placeholder="...">
        
        <div id="fileArea" class="hidden" style="margin-top: 15px;">
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <button class="btn btn-pay" onclick="gen()">TENGENEZA SASA</button>

        <div id="qrDisplay">
            <div id="qrCanvas"></div>
            <p style="color: #333; font-size: 11px; margin-top: 10px; font-weight: bold;">TAYARI! Long press ku-save.</p>
        </div>
        
        <p style="margin-top: 20px; font-size: 10px; color: #ff4444;">Ukifunga au ku-refresh ukurasa huu, utahitaji voucher nyingine.</p>
    </div>
</div>

<script>
    // Tengeneza list ya DV101 mpaka DV150
    const validCodes = [];
    for(let i=101; i<=150; i++) { validCodes.push("DV" + i); }

    function verify() {
        let inputField = document.getElementById('pass');
        let p = inputField.value.toUpperCase().trim();
        
        // Pata list ya vocha zilizokwishatumika kwenye simu hii
        let used = JSON.parse(localStorage.getItem('expiredVouchers') || "[]");

        if (used.includes(p)) {
            alert("SAMAHANI: Voucher hii imeshaisha muda wake (EXPIRED).");
            inputField.value = "";
            return;
        }

        if(validCodes.includes(p)) {
            // MUHIMU: Iweke namba hii kwenye "Expired list" papo hapo
            used.push(p);
            localStorage.setItem('expiredVouchers', JSON.stringify(used));
            
            // Onyesha App
            document.getElementById('lock').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            alert("Voucher imekubaliwa! Itatumika kwa kipindi hiki tu.");
        } else { 
            alert("Voucher sio sahihi!"); 
        }
    }

    // Usiruhusu mtu kurefresh na kubaki ndani
    window.onbeforeunload = function() {
        return "Je, una uhakika unataka kutoka? Voucher yako itapotea.";
    };

    let mode = '';
    function setMode(m) {
        mode = m;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active-opt'));
        document.getElementById('opt-'+m).classList.add('active-opt');
        
        if(m === 'picha') {
            document.getElementById('fileArea').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
        } else {
            document.getElementById('fileArea').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('content').placeholder = (m === 'link') ? "Weka Link..." : "Weka Namba...";
        }
        document.getElementById('qrDisplay').style.display = 'none';
    }

    function gen() {
        let qrCanvas = document.getElementById('qrCanvas');
        qrCanvas.innerHTML = "";
        
        if(mode === 'picha') {
            let file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Chagua picha!");
            let reader = new FileReader();
            reader.onload = function(e) {
                new QRCode(qrCanvas, { text: e.target.result, width: 250, height: 250 });
                document.getElementById('qrDisplay').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        } else {
            let val = document.getElementById('content').value;
            if(!val) return alert("Jaza taarifa!");
            let data = (mode === 'tel') ? "tel:" + val : val;
            new QRCode(qrCanvas, { text: data, width: 250, height: 250 });
            document.getElementById('qrDisplay').style.display = 'flex';
        }
    }
</script>

</body>
</html>
