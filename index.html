<body style="background:#121212; color:white; text-align:center; padding-top:50px;">
    <h2>DVARY PAY</h2>
    <textarea id="sms" placeholder="Paste SMS hapa" style="width:80%; height:100px;"></textarea><br>
    <button onclick="check()" style="padding:10px; margin-top:10px; background:green; color:white;">THIBITISHA</button>
    <p id="msg"></p>

    <script>
    async function check() {
        const res = await fetch('/api/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ fullSms: document.getElementById('sms').value })
        });
        const data = await res.json();
        if(data.success) { window.location.href = data.link; } 
        else { document.getElementById('msg').innerText = data.message; }
    }
    </script>
</body>
