<script>
async function smartVerify() {
    const fullText = document.getElementById('fullSms').value;
    const match = fullText.match(/[A-Z0-9]{10,12}/);
    
    if (!match) {
        return alert("❌ SMS haina ID sahihi. Hakikisha ume-copy SMS yote.");
    }

    const id = match[0];
    const btn = document.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Inahakiki...";

    try {
        const response = await fetch(`/api/verify?id=${id}`);
        const result = await response.json();

        if (result.verified) {
            alert("✅ Malipo Yamethibitishwa!");
            window.location.href = "https://wa.me/255618258121?text=Nimeshalipia_ID_" + id;
        } else if (response.status === 429) {
            alert("⚠️ Umezuiliwa kwa muda kwa sababu ya kujaribu ID za uongo.");
        } else {
            alert("❌ ID hii haipo au imeshatumika. Hakikisha SMS imeshaingia.");
        }
    } catch (err) {
        alert("⚠️ Kuna tatizo la mtandao. Jaribu tena.");
    } finally {
        btn.disabled = false;
        btn.innerText = "THIBITISHA MALIPO";
    }
}
</script>
