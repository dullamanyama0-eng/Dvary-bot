<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary QR Pro - Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #0088cc; --dark: #121212; --card: #1e1e1e; --success: #25D366; --warning: #ff9800; --danger: #f44336; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #333; position: relative; }
        
        /* VIDUDE VYA HALI (STATUS BADGES) */
        .status-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .bg-success { background: rgba(37, 211, 102, 0.2); color: #25D366; border: 1px solid #25D366; }
        .bg-warning { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid #ff9800; }
        .bg-danger { background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }

        h1 { font-size: 24px; margin: 10px 0; color: var(--primary); text-align: center; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #0b0b0b; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-pay { background: var(--primary); color: white; }
        .btn-wa { background: var(--success); color: white; text-decoration: none; display: block; text-align: center; }
        
        /* OPTION GRID ILIYOBORESHWA */
        .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .opt-btn { background: #2a2a2a; color: #aaa; padding: 10px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; font-size: 11px; }
        .active-opt { border-color: var(--primary); color: white; background: #00334d; }
        
        #qrDisplay { margin-top: 25px; padding: 15px; background: white; border-radius: 20px; display: none; flex-direction: column; align-items: center; }
        #qrCanvas canvas { width: 100% !important; height: auto !important; border-radius: 10px; }
        .hidden { display: none; }
        .footer { margin-top: 30px; font-size: 11px; color: #555; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="lock" class="card">
        <div class="status-container">
            <span class="badge bg-success">SERVER: ONLINE</span>
            <span class="badge bg-warning">UPDATE: V2.1</span>
            <span class="badge bg-danger">MAREKEBISHO: YAMEISHA</span>
        </div>

        <h1>DVARY QR PRO</h1>
        <p style="text-align: center; color: #bbb; font-size: 13px;">Weka Code kufungua utengeneze QR Code</p>
        
        <input type="text" id="pass" placeholder="Ingiza Code hapa...">
        <button class="btn btn-pay" onclick="verify()">FUNGUA SASA</button>
        <a href="https://wa.me/225752670587?text=Habari+Dvary,+nahitaji+Code+ya+QR+App" class="btn btn-wa">NUNUA CODE (WhatsApp)</a>
    </div>

    <div id="app" class="card hidden">
        <h2 style="text-align: center; color: var(--primary); font-size: 18px;">CHAGUA OPTION</h2>
        
        <div class="option-grid">
            <button class="opt-btn" id="opt-link" onclick="setMode('link')">🌐 LINK</button>
            <button class="opt-btn" id="opt-picha" onclick="setMode('picha')">🖼️ PICHA</button>
            <button class="opt-btn" id="opt-wa" onclick="setMode('wa')">💬 WHATSAPP</button>
            <button class="opt-btn" id="opt-tel" onclick="setMode('tel')">📞 NAMBA</button>
            <button class="opt-btn" id="opt-text" onclick="setMode('text')">📄 TEXT</button>
            <button class="opt-btn" id="opt-wifi" onclick="setMode('wifi')">📶 WIFI</button>
        </div>
        
        <div id="inputArea">
            <input type="text" id="content" placeholder="Ingiza taarifa hapa...">
            <textarea id="textContent" class="hidden" rows="3" placeholder="Andika ujumbe wako..."></textarea>
            
            <div id="fileArea" class="hidden">
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div id="wifiArea" class="hidden">
                <input type="text" id="wifiName" placeholder="Jina la Wifi (SSID)">
                <input type="text" id="wifiPass" placeholder="Password ya Wifi">
            </div>
        </div>

        <button class="btn btn-pay" onclick="gen()">TENGENEZA QR SASA</button>

        <div id="qrDisplay">
            <div id="qrCanvas"></div>
            <button id="downloadBtn" class="btn" style="background: var(--success); color: white;" onclick="downloadQR()">📥 DOWNLOAD QR CODE</button>
        </div>
        
        <button class="btn" style="background:#333; color:#888; font-size:12px; margin-top:30px;" onclick="location.reload()">LOGOUT</button>
    </div>
    
    <div class="footer">Dvary Manyama Brand &copy; 2026</div>
</div>

<script>
    const validCodes = [];
    for(let i=101; i<=150; i++) { validCodes.push("DV" + i); }

    function verify() {
        let input = document.getElementById('pass');
        let code = input.value.toUpperCase().trim();
        let used = JSON.parse(localStorage.getItem('dvary_expired_codes') || "[]");

        if (used.includes(code)) {
            alert("❌ CODE HII IMESHAISHA!");
            return;
        }

        if(validCodes.includes(code)) {
            used.push(code);
            localStorage.setItem('dvary_expired_codes', JSON.stringify(used));
            document.getElementById('lock').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setMode('link');
        } else { alert("❌ CODE SIO SAHIHI!"); }
    }

    let mode = 'link';
    function setMode(m) {
        mode = m;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active-opt'));
        document.getElementById('opt-'+m).classList.add('active-opt');
        
        document.getElementById('content').classList.toggle('hidden', m === 'picha' || m === 'text' || m === 'wifi');
        document.getElementById('textContent').classList.toggle('hidden', m !== 'text');
        document.getElementById('fileArea').classList.toggle('hidden', m !== 'picha');
        document.getElementById('wifiArea').classList.toggle('hidden', m !== 'wifi');
        
        document.getElementById('qrDisplay').style.display = 'none';
    }

    function gen() {
        const canvasDiv = document.getElementById('qrCanvas');
        canvasDiv.innerHTML = "";
        
        if(mode === 'picha') {
            let file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Chagua picha!");
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = new Image();
                img.onload = function() {
                    let cvs = document.createElement('canvas');
                    let ctx = cvs.getContext('2d');
                    cvs.width = 45; cvs.height = 45;
                    ctx.drawImage(img, 0, 0, 45, 45);
                    new QRCode(canvasDiv, { text: cvs.toDataURL('image/jpeg', 0.1), width: 300, height: 300 });
                    document.getElementById('qrDisplay').style.display = 'flex';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            let data = "";
            if(mode === 'wifi') {
                let name = document.getElementById('wifiName').value;
                let pass = document.getElementById('wifiPass').value;
                data = `WIFI:S:${name};T:WPA;P:${pass};;`;
            } else if(mode === 'text') {
                data = document.getElementById('textContent').value;
            } else {
                let val = document.getElementById('content').value;
                if(!val) return alert("Jaza taarifa!");
                data = val;
                if(mode === 'tel') data = "tel:" + val;
                if(mode === 'wa') data = "https://wa.me/" + val.replace(/\+/g, '');
            }
            
            new QRCode(canvasDiv, { text: data, width: 300, height: 300 });
            document.getElementById('qrDisplay').style.display = 'flex';
        }
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrCanvas canvas') || document.querySelector('#qrCanvas img');
        const link = document.createElement('a');
        link.href = canvas.src || canvas.toDataURL("image/png");
        link.download = 'Dvary-QR.png';
        link.click();
    }
</script>

</body>
</html>
