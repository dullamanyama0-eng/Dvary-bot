<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary-bot Image Uploader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { margin: 10px 0; width: 100%; }
        button { background: #6e45e2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; word-break: break-all; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Dvary-bot Uploader</h2>
    <p>Chagua picha uipakie Railway</p>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadFile()">Pakia Sasa (Upload)</button>
    <div id="result"></div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const resultDiv = document.getElementById('result');
        
        if (fileInput.files.length === 0) {
            alert("Tafadhali chagua picha kwanza!");
            return;
        }

        resultDiv.innerHTML = "Inapakia... Subiri...";
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            // Hapa tunatumia link yako ya Railway
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (data.url) {
                resultDiv.innerHTML = `✅ Imefanikiwa!<br><br>Link ya Picha:<br><a href="${data.url}" target="_blank">${data.url}</a>`;
            } else {
                resultDiv.innerHTML = "❌ Imeshindikana kupata link.";
            }
        } catch (error) {
            resultDiv.innerHTML = "❌ Error: " + error.message;
        }
    }
</script>

</body>
</html>
