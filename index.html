<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Connection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; overflow: hidden; }

        /* Video ya Background */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            filter: blur(10px) brightness(0.5); /* Inaficha video kwa mbali */
        }

        /* Box la Malipo */
        .main-overlay {
            height: 100%; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .card {
            background: #fff; width: 90%; max-width: 380px;
            padding: 30px; border-radius: 24px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card h1 { font-size: 22px; color: #111; margin-bottom: 12px; font-weight: 800; }
        .card p { font-size: 15px; color: #444; margin-bottom: 25px; line-height: 1.4; }

        .btn-pay {
            background: #00a651; color: white; border: none;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 166, 81, 0.3);
            text-decoration: none; display: block;
        }

        .btn-pay:active { transform: scale(0.97); }

        .footer-text { margin-top: 20px; font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="bg-container">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-dancing-and-smiling-in-a-field-40033-large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="main-overlay">
        <div class="card">
            <h1>Lipia TZS 1,000 Kuendelea</h1>
            <p>Kupata connection zote na kujiunga na magroup yetu, kamilisha malipo kwa kubonyeza kitufe hapa chini.</p>

            <a href="https://harakapay.net/pay/HPMO4UY244" class="btn-pay">
                LIPIA SASA
            </a>

            <div class="footer-text">
                M-PESA • TIGO PESA • AIRTEL • HALOPESA
            </div>
        </div>
    </div>

</body>
</html>
