<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Doc Vault</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>

    <div id="loginBox" class="container">
        <h1>🔒 Private Vault</h1>
        <p>Ingiza password kufungua documents</p>
        <input type="password" id="passInput" placeholder="Password hapa...">
        <button onclick="checkPassword()">Fungua</button>
    </div>

    <div id="vaultBox" class="container hidden">
        <h1>📂 Document Manager</h1>
        <div class="upload-area">
            <input type="file" id="fileChooser">
            <button id="uploadBtn" onclick="uploadToFirebase()">Upload kwa Cloud</button>
        </div>
        <div id="progressBox">
            <p id="statusText">Tayari kupokea faili...</p>
        </div>
        <hr>
        <h3>Documents Zilizopo:</h3>
        <ul id="fileList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
