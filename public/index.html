<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY DOWNLOADER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white flex flex-col items-center justify-center min-h-screen p-5">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-cyan-500/30">
        <h1 class="text-3xl font-bold text-cyan-400 text-center mb-2">DVARY TECH</h1>
        <p class="text-gray-400 text-center mb-8 text-sm uppercase">Video & Music Downloader</p>
        
        <input type="text" id="urlInput" placeholder="Paste link hapa..." 
            class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 mb-5 focus:border-cyan-400 outline-none">
        
        <div class="flex gap-3">
            <button onclick="getLink('video')" class="flex-1 bg-cyan-500 text-black font-bold py-3 rounded-lg hover:bg-cyan-400">VIDEO</button>
            <button onclick="getLink('audio')" class="flex-1 border border-cyan-500 text-cyan-500 font-bold py-3 rounded-lg hover:bg-cyan-500 hover:text-black">AUDIO (MP3)</button>
        </div>

        <div id="status" class="mt-6 text-center hidden">
            <p class="text-yellow-400 animate-pulse">Inachakata... Subiri sekunde chache</p>
        </div>
        <div id="result" class="mt-6 text-center"></div>
    </div>

    <script>
        async function getLink(type) {
            const url = document.getElementById('urlInput').value;
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            if(!url) return alert("Weka link ya TikTok au YouTube!");

            status.classList.remove('hidden');
            result.innerHTML = "";

            try {
                const res = await fetch(`/api/download?url=${encodeURIComponent(url)}&type=${type}`);
                const data = await res.json();

                status.classList.add('hidden');
                if(data.downloadUrl) {
                    result.innerHTML = `<a href="${data.downloadUrl}" target="_blank" class="block bg-green-500 text-black font-bold p-3 rounded-lg mt-2">BONYEZA HAPA KUPAKUA</a>`;
                } else {
                    result.innerHTML = `<p class="text-red-500 font-bold">Imeshindikana! Jaribu link nyingine.</p>`;
                }
            } catch (e) {
                status.classList.add('hidden');
                alert("Kuna tatizo la mtandao!");
            }
        }
    </script>
</body>
</html>
